    .install-banner {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 14px 16px;
      border: 1px solid rgba(41, 91, 68, 0.18);
      border-radius: 18px;
      background: rgba(255, 251, 244, 0.94);
      box-shadow: 0 12px 30px rgba(26, 41, 33, 0.16);

    .install-banner__copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

      color: #234638;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    .install-banner__text {
      color: #5f6d63;
      font-size: 13px;
      line-height: 1.35;
    }

    .install-banner__button {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: #295b44;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .install-banner__button:hover {
      background: #214b38;
    }

    @media (max-width: 640px) {
      .install-banner {
        left: 12px;
        right: 12px;
        bottom: 12px;
        flex-direction: column;
        align-items: stretch;
      }

      .install-banner__button {
        width: 100%;
      }

<body>
